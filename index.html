<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Prep Pro</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">PMP Prep Pro</div>
        <div class="nav-links">
            <a href="#" data-route="home">Inicio</a>
            <a href="#" data-route="syllabus">Temario PMP</a>
            <a href="#" data-route="study">Estudio Activo</a>
            <a href="#" data-route="exams">Simulacros</a>
            <a href="#" data-route="results">Resultados</a>
        </div>
    </nav>

    <main id="app-container">
        <!-- Views will be injected here by router -->
    </main>

    <!-- Templates -->
    <template id="tpl-home">
        <section class="view-section">
            <div class="hero-card">
                <h1>Preparación PMP Real</h1>
                <p>Simulacros situacionales, analítica y temario estructurado según el ECO.</p>
            </div>
            
            <div class="dashboard-cards">
                <div class="card" onclick="window.app.navigate('exams')">
                    <h3>🎯 Simulacros de Examen</h3>
                    <p>Exámenes completos de 180 preguntas en 3 bloques con temporizador oficial (230 min).</p>
                </div>
                <div class="card" onclick="window.app.navigate('syllabus')">
                    <h3>📚 Temario Profundo</h3>
                    <p>Dominio People, Process y Business Environment. Patrones ágiles, híbridos y predictivos.</p>
                </div>
                <div class="card" onclick="window.app.navigate('results')">
                    <h3>📊 Resultados</h3>
                    <p>Revisa tus simulacros anteriores, comprende tus errores y evalúa tu preparación.</p>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-syllabus">
        <section class="view-section syllabus-view">
            <h1>Temario PMP Profundo</h1>
            <p>Selecciona un dominio para explorar sus conceptos clave, trampas y pistas para el examen.</p>
            <div id="syllabus-container" class="syllabus-layout">
                <!-- SyllabusLoader injects here -->
            </div>
        </section>
    </template>

    <template id="tpl-exams">
        <section class="view-section">
            <h1>Simulacros Oficiales</h1>
            <div id="exam-list" class="exam-list">
                <!-- Exam cards injected here -->
            </div>
        </section>
    </template>

    <template id="tpl-exam-runner">
        <section class="view-section exam-runner">
            <div class="exam-header">
                <div class="exam-info">
                    <span id="exam-title">Examen</span>
                    <span id="exam-block">Bloque 1 de 3</span>
                    <span id="exam-progress">Pregunta 1 de 60</span>
                </div>
                <div class="exam-timer" id="global-timer">230:00</div>
            </div>
            <div class="exam-body">
                <div class="question-container" id="question-container">
                    <!-- Question injected here -->
                </div>
                <div class="exam-controls">
                    <button id="btn-prev" class="btn secondary">Anterior</button>
                    <button id="btn-mark" class="btn warning">Marcar para revisar</button>
                    <button id="btn-next" class="btn primary">Siguiente</button>
                    <button id="btn-finish-block" class="btn danger hidden">Finalizar Bloque</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-break">
        <section class="view-section break-screen">
            <h1>Descanso de 10 Minutos</h1>
            <p>Has completado un bloque. Tienes 10 minutos de descanso opcional.</p>
            <div class="timer-large" id="break-timer">10:00</div>
            <button id="btn-resume" class="btn primary large">Reanudar Examen (Bloque Siguiente)</button>
        </section>
    </template>

    <template id="tpl-results">
        <section class="view-section results-view">
            <h1>Resultados del Simulacro</h1>
            <div id="results-container">
                <!-- Analytics injects here -->
            </div>
        </section>
    </template>

    <script type="module" src="js/app.js"></script>
</body>
</html>
